services:
  backend_counter_stagingapp:
    build:
      context: ./backend/
      dockerfile: ./counter/Dockerfile
    env_file:
      - back.env.staging
    restart: unless-stopped
    networks:
      - staging_network

  backend_cleanup_stagingapp:
    build:
      context: ./backend/
      dockerfile: ./cleanup/Dockerfile
    env_file:
      - cleanup.env.staging
    restart: unless-stopped
    networks:
      - staging_network

  frontend_stagingapp:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        VITE_APIURL: "https://testingapp.sumcrowds.com/api/"
        VITE_WSURL: "wss://testingapp.sumcrowds.com/ws/"
    restart: unless-stopped
    networks:
      - staging_network

  nginx_stagingproxy:
    build:
      context: ./nginx
      dockerfile: Dockerfile.dev
    ports:
      - "40000:80"
    restart: unless-stopped
    networks:
      - staging_network
    depends_on:
      - backend_counter_stagingapp
      - frontend_stagingapp
    command: ["nginx", "-g", "daemon off;"]

networks:
  staging_network:
    driver: bridge
