name: Build the packages/containers
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Push package
        run : |
          GIT_COMMIT_SHA=$(git rev-parse --short HEAD)
          docker compose -f docker-compose.kubernetes.yaml build
          docker compose -f docker-compose.kubernetes.yaml push
