version: "2"
sql:
  - engine: "postgresql"
    queries: "sharedlib/database/queries/"
    schema: "sharedlib/database/"
    gen:
      go:
        package: "sqlcdb"
        out: "sharedlib/database/sqlcdb"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
