services:
  runner:
    image: code.forgejo.org/forgejo/runner:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config.yml:/config.yml
      - ./runner-data:/data
    command: forgejo-runner daemon --config /config.yml
  backend_counter_app:
    build:
      context: ./backend/
      dockerfile: ./counter/Dockerfile
    image: git.thyamix.com/thyamix/sumcrowds/counter:latest
    environment:
      CONFIG_ENV: prod
      CONFIG_PATH: /app/config.prod.toml
    volumes:
      - ./config.prod.toml:/app/config.prod.toml:ro
    restart: unless-stopped
    networks:
      - prod_network

  backend_cleanup_app:
    build:
      context: ./backend/
      dockerfile: ./cleanup/Dockerfile.kube
    image: git.thyamix.com/thyamix/sumcrowds/cleanup:latest
    environment:
      CONFIG_ENV: prod
      CONFIG_PATH: /app/config.prod.toml
    volumes:
      - ./config.prod.toml:/app/config.prod.toml:ro
    restart: unless-stopped
    networks:
      - prod_network


  frontend_app:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_APIURL: "/api/"
        VITE_WSURL: "/ws/"
    image: git.thyamix.com/thyamix/sumcrowds/frontend:latest
    restart: unless-stopped
    networks:
      - prod_network

  nginx_proxy:
    build:
      context: ./nginx
      dockerfile: Dockerfile.kubernetes
    image: git.thyamix.com/thyamix/sumcrowds/marketing:latest
    ports:
      - "40001:80"
    restart: unless-stopped
    networks:
      - prod_network
    depends_on:
      - backend_counter_app
      - frontend_app
    command: ["nginx", "-g", "daemon off;"]

networks:
  prod_network:
    driver: bridge
