services:
  postgres_dev:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sumcrowds
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: sumcrowds
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - dev_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sumcrowds -d sumcrowds"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend_counter_dev:
    build:
      context: ./backend/
      dockerfile: ./counter/Dockerfile
    env_file:
      - back.env.dev
    environment:
      DATABASE_URL: "postgres://sumcrowds:devpassword@postgres_dev:5432/sumcrowds?sslmode=disable"
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - dev_network
    depends_on:
      postgres_dev:
        condition: service_healthy

  backend_cleanup_dev:
    build:
      context: ./backend/
      dockerfile: ./cleanup/Dockerfile
    env_file:
      - cleanup.env.dev
    environment:
      DATABASE_URL: "postgres://sumcrowds:devpassword@postgres_dev:5432/sumcrowds?sslmode=disable"
    restart: unless-stopped
    networks:
      - dev_network
    depends_on:
      postgres_dev:
        condition: service_healthy

  frontend_dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        VITE_APIURL: "http://localhost:8080/api/"
        VITE_WSURL: "ws://localhost:8080/ws/"
    ports:
      - "5173:5173"
    restart: unless-stopped
    networks:
      - dev_network
    depends_on:
      - backend_counter_dev

volumes:
  postgres_data:

networks:
  dev_network:
    driver: bridge
