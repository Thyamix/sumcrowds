services:
  postgres_dev:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sumcrowds
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: sumcrowds
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - dev_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sumcrowds -d sumcrowds"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend_counter_dev:
    build:
      context: ./backend/
      dockerfile: ./counter/Dockerfile
    environment:
      CONFIG_ENV: dev
      CONFIG_PATH: /app/config.dev.toml
      ENV_PATH: /app/.env.dev
    volumes:
      - ./config.dev.toml:/app/config.dev.toml:ro
      - ./.env.dev:/app/.env.dev:ro
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - dev_network
    depends_on:
      postgres_dev:
        condition: service_healthy

  backend_cleanup_dev:
    build:
      context: ./backend/
      dockerfile: ./cleanup/Dockerfile
    environment:
      CONFIG_ENV: dev
      CONFIG_PATH: /app/config.dev.toml
      ENV_PATH: /app/.env.dev
    volumes:
      - ./config.dev.toml:/app/config.dev.toml:ro
      - ./.env.dev:/app/.env.dev:ro
    restart: unless-stopped
    networks:
      - dev_network
    depends_on:
      postgres_dev:
        condition: service_healthy

  frontend_dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        VITE_APIURL: "http://192.168.1.75:8080/api/"
        VITE_WSURL: "ws://192.168.1.75:8080/ws/"
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - dev_network
    depends_on:
      - backend_counter_dev

volumes:
  postgres_data:

networks:
  dev_network:
    driver: bridge
